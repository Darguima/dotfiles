---

# ========================
# Dotfiles Environment
# ========================

# Will affect some specific features that can be active/disable or work differently depending the environment
target_environment: desktop # desktop / laptop

# The linux username of the one who will use the dotfiles
linux_username: "{{ ansible_facts['user_id'] }}"

# The linux user home directory, (should be be equivalent to /home/{{ linux_username }})
linux_user_home: "{{ ansible_facts['user_dir'] }}"

# ========================
# Syncthing
# ========================

# Syncthing GUI username
syncthing_gui_user: "{{ linux_username }}"

# Syncthing GUI username
# syncthing_gui_password: Put here your bcrypt password hash
