- name: Installing waybar and a bunch of dependencies
  pacman:
    name:
      - waybar
      - ttf-font-awesome # used in style.css
    state: latest
  become: true

- name: Ensuring waybar config directory exists
  file:
    path: "{{ linux_user_home }}/.config/waybar"
    state: directory

- name: Copying waybar config folder
  copy:
    src: ./
    dest: "{{ linux_user_home }}/.config/waybar/"

# Done on previous task, but without correct mode
- name: Copying disable-keyboard.sh script into config folder
  copy:
    src: ./disable-keyboard.sh
    dest: "{{ linux_user_home }}/.config/waybar/"
    mode: '0755'
