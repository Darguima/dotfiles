- name: Installing rofi-wayland
  pacman:
    name: rofi-wayland
    state: latest
  become: true

- name: Copying rofi configuration files
  copy:
    src: config/
    dest: "{{ linux_user_home }}/.config/rofi/"

- name: Ensuring ~/.local/share/fonts directory exists
  file:
    path: "{{ linux_user_home }}/.local/share/fonts"
    state: directory
    mode: '0755'

- name: Copy all font files to ~/.local/share/fonts
  copy:
    src: fonts/
    dest: "{{ linux_user_home }}/.local/share/fonts/"
    mode: '0644'
