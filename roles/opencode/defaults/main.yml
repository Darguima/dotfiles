# ### Análise de Limites (Tier Go)

# * **Alto Volume (+30k):** `DeepSeek V4 Flash` e `MiMo-V2.5`. Excelentes para iteração contínua e chat.
# * **Volume Médio (3k - 4.3k):** `Qwen3.7 Plus`, `DeepSeek V4 Pro`, `MiniMax M2.7/M3`, `MiMo-V2.5-Pro`. O *sweet spot* para trabalho de desenvolvimento regular.
# * **Limites Apertados (<1.2k):** `Kimi K2.6`, `Qwen3.7 Max`, `GLM-5.1`. Os "pesos pesados" para problemas complexos de arquitetura ou *debugging* profundo.

# ---

# ### Configuração de Agentes Recomendada

# #### 1. General (Chat e Dúvidas Rápidas)

# * **Modelo:** `MiMo-V2.5` ou `DeepSeek V4 Flash`
# * **Porquê:** Com mais de 30.000 *requests* a cada 5 horas, nunca vais esgotar o limite em conversas normais, explicações de conceitos ou geração de *scripts* simples.

# #### 2. Plan (Arquitetura e Estrutura)

# * **Diário (`plan`):** `Qwen3.7 Plus` (4.300 reqs). É excelente a estruturar projetos e tem um limite muito confortável para o dia a dia.
# * **Pesado (`plan-hard`):** `Qwen3.7 Max` (950 reqs). Cria este agente extra para quando precisares de desenhar lógicas de sistemas intrincadas, rever *Infrastructure-as-Code* ou planear refatorizações massivas.

# #### 3. Build (Escrita de Código)

# * **Diário (`build`):** `DeepSeek V4 Flash` (31.650 reqs). A velocidade de geração é incrível e o limite massivo permite-te usar ferramentas como o *Language Server Protocol* (LSP) e o *auto-complete* agressivamente.
# * **Pesado (`build-hard`):** `DeepSeek V4 Pro` (3.450 reqs). Quando o *Flash* começar a andar em círculos num problema algorítmico complexo ou a falhar na integração de componentes, mudas para este.

# #### 4. Debug (O Comando de Caça aos Bugs)

# * **Modelo:** `GLM-5.1` (880 reqs) ou `Kimi K2.6` (1.150 reqs).
# * **Porquê:** Já tens um comando `"debug"` configurado no teu JSON para correr testes e verificar lógica no terminal (usando a tua *shell* ZSH). Para ler *logs* longos e descobrir falhas de concorrência ou erros obscuros, o `GLM-5.1` é fenomenal, e como não fazes *debug* profundo a cada 5 minutos, o limite de 880 é adequado.
