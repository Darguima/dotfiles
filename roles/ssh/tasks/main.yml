- name: Installing dependency Gnome Keyring
  pacman:
    name: gnome-keyring
    state: latest
  become: true

- name: Ensuring SSH folder exists
  file:
    path: "{{ linux_user_home }}/.ssh"
    state: directory

- name: Enabling and Starting GCR SSH Agent service
  systemd:
    name: gcr-ssh-agent.socket
    state: restarted
    enabled: yes
    scope: "user"
