- name: Installing Arduino-CLI
  pacman:
    name: arduino-cli
    state: latest
  become: True

- name: Installing Arduino-IDE
  kewlfft.aur.aur:
    use: yay
    name: arduino-ide-bin
    state: latest
  become: True
  become_user: aur_builder

- name: Installing PlatformIO
  pacman:
    name: platformio-core
    state: latest
  become: True

- name: "Adding user '{{ linux_username }}' to 'uucp' group"
  user:
    name: "{{ linux_username }}"
    groups: uucp
    append: True
  become: True
