- name: Installing KDE Connect
  pacman:
    name: kdeconnect
    state: latest
  become: true

- name: Installing hypr-kdeconnect-fix
  kewlfft.aur.aur:
    use: yay
    name: hypr-kdeconnect-fix-git
    state: latest
  become: true
  become_user: aur_builder

- name: Ensuring xdg-desktop-portal config directory exists
  file:
    path: "{{ linux_user_home }}/.config/xdg-desktop-portal"
    state: directory

- name: Copying KDE Connect portals config
  copy:
    src: portals.conf
    dest: "{{ linux_user_home }}/.config/xdg-desktop-portal/portals.conf"
